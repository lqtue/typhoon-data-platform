# crawl-warnings.yml
# Runs hourly. Truncates and reinserts NCHMF flood/landslide warnings.

name: Crawl Flood Warnings (NCHMF)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NCHMF crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -c "
          import logging; logging.basicConfig(level=logging.INFO)
          from crawlers.nchmf import run; run()
          "
